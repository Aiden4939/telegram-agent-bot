name: Build & Push (GHCR)

on:
  push:
    branches: ["main"]

jobs:
  build-playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push playwright-service
        uses: docker/build-push-action@v6
        with:
          context: ./playwright-service
          push: true
          tags: |
            ghcr.io/aiden4939/telegram-playwright-service:latest
            ghcr.io/aiden4939/telegram-playwright-service:${{ github.sha }}

  build-bot:
    runs-on: ubuntu-latest
    needs: build-playwright
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push telegram-agent-bot
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/aiden4939/telegram-agent-bot:latest
            ghcr.io/aiden4939/telegram-agent-bot:${{ github.sha }}
